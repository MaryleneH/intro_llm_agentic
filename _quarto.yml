project:
  type: website
  output-dir: docs
  render:
    - fr.qmd
    - index.qmd

website:
  title: "LLMs & Agentic AI for PMs"
  navbar: false

format:
  revealjs:
    theme: [default, custom.scss]
    slide-number: "c/t"
    progress: true
    history: true
    touch: true
    controls: true
    controls-layout: bottom-right
    transition: fade
    transition-speed: slow
    background-transition: fade
    auto-animate: true
    auto-animate-easing: ease-in-out
    highlight-style: github-dark
    center: false
    width: 1920
    height: 1080
    margin: 0.08
    logo: assets/logo.svg
    footer: "LLMs & Agentic AI for PMs — From Prompts to Products"
    menu:
      side: left
      width: wide
